name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Hard gates — these are green today and block regressions.
      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      # Informational for now: the repo has pre-existing lint debt (see TODO.md).
      # Flip continue-on-error off once that's cleared to make lint a hard gate.
      - name: Lint
        run: npm run lint
        continue-on-error: true
